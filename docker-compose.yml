services:
  postgres:
    image: postgres:16-alpine
    container_name: nax-api-postgres
    environment:
      POSTGRES_DB: nax_api
      POSTGRES_USER: nax
      POSTGRES_PASSWORD: nax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nax -d nax_api"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: nax-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgres://nax:nax@postgres:5432/nax_api
      DB_POOL_MAX: 10
      JWT_ACCESS_SECRET: replace-this-with-at-least-32-random-characters
      JWT_ACCESS_EXPIRES_IN: 15m
      REFRESH_TOKEN_DAYS: 30
      REFRESH_COOKIE_NAME: nax_refresh_token
      COOKIE_SECURE: "false"
      CORS_ORIGIN: "*"
      UPLOAD_DIR: uploads
      MAX_UPLOAD_BYTES: 10485760
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:

